name: rtcstack

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "${PORT_HTTP:-3240}:80"
      - "${PORT_HTTPS:-3241}:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CADDY_TLS_MODE: ${CADDY_TLS_MODE:-internal}
      API_PORT: ${API_PORT:-3246}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      livekit:
        condition: service_healthy
    networks:
      - rtcstack_internal

  livekit:
    image: livekit/livekit-server:v1.11.0
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_REDIS_ADDRESS: ${LIVEKIT_REDIS_ADDRESS:-redis:6379}
      LIVEKIT_REDIS_PASSWORD: ${REDIS_PASSWORD}
      NODE_IP: ${LIVEKIT_RTC_EXTERNAL_IP:-127.0.0.1}
      LIVEKIT_RTC_EXTERNAL_IP: ${LIVEKIT_RTC_EXTERNAL_IP}
      LIVEKIT_LOG_LEVEL: ${LIVEKIT_LOG_LEVEL:-info}
      LIVEKIT_UDP_PORT_MIN: ${LIVEKIT_UDP_PORT_MIN:-3250}
      LIVEKIT_UDP_PORT_MAX: ${LIVEKIT_UDP_PORT_MAX:-3260}
      LIVEKIT_TURN_ENABLED: ${LIVEKIT_TURN_ENABLED:-false}
      LIVEKIT_TURN_HOST: ${LIVEKIT_TURN_HOST:-}
      LIVEKIT_TURN_TLS_PORT: ${LIVEKIT_TURN_TLS_PORT:-3245}
      LIVEKIT_TURN_UDP_PORT: ${LIVEKIT_TURN_UDP_PORT:-3244}
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${PORT_LIVEKIT:-3242}:7880"
      - "${PORT_LIVEKIT_RTC:-3243}:7881/tcp"
      - "${PORT_RTC_UDP_MIN:-3250}-${PORT_RTC_UDP_MAX:-3260}:${LIVEKIT_UDP_PORT_MIN:-3250}-${LIVEKIT_UDP_PORT_MAX:-3260}/udp"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - rtcstack_internal

  egress:
    image: livekit/egress:v1.12.0
    restart: unless-stopped
    environment:
      # egress.yaml does not support ${VAR} substitution — pass config inline instead
      EGRESS_CONFIG_BODY: |
        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ${LIVEKIT_URL:-ws://livekit:7880}
        redis:
          address: redis:6379
          password: ${REDIS_PASSWORD}
        s3:
          access_key: ${AWS_ACCESS_KEY_ID}
          secret: ${AWS_SECRET_ACCESS_KEY}
          region: ${AWS_DEFAULT_REGION:-us-east-1}
          endpoint: ${S3_ENDPOINT:-http://minio:9000}
          bucket: ${EGRESS_S3_BUCKET:-rtcstack-recordings}
    cap_add:
      - SYS_ADMIN
    depends_on:
      livekit:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - rtcstack_internal

  coturn:
    image: coturn/coturn:4.6.2-alpine
    restart: unless-stopped
    ports:
      - "${PORT_TURN:-3244}:3478/udp"
      - "${PORT_TURN:-3244}:3478/tcp"
      - "${PORT_TURN_TLS:-3245}:5349/udp"
      - "${PORT_TURN_TLS:-3245}:5349/tcp"
      - "${PORT_TURN_RELAY_MIN:-3261}-${PORT_TURN_RELAY_MAX:-3280}:${PORT_TURN_RELAY_MIN:-3261}-${PORT_TURN_RELAY_MAX:-3280}/udp"
    environment:
      COTURN_STATIC_AUTH_SECRET: ${COTURN_STATIC_AUTH_SECRET}
      COTURN_REALM: ${COTURN_REALM}
      COTURN_EXTERNAL_IP: ${COTURN_EXTERNAL_IP}
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - rtcstack_internal

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT_API:-3246}:${API_PORT:-3246}"
    environment:
      API_PORT: ${API_PORT:-3246}
      API_KEY: ${API_KEY}
      API_SECRET: ${API_SECRET}
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TOKEN_TTL_SECONDS: ${TOKEN_TTL_SECONDS:-21600}
      LIVEKIT_URL_INTERNAL: ${LIVEKIT_URL_INTERNAL:-http://livekit:7880}
      LIVEKIT_WSS_URL: ${LIVEKIT_WSS_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      MINIO_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-rtcstack-recordings}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TRANSCRIPTION_LIVE_ENABLED: ${TRANSCRIPTION_LIVE_ENABLED:-false}
      TRANSCRIPTION_POST_ENABLED: ${TRANSCRIPTION_POST_ENABLED:-false}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
    depends_on:
      livekit:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:${API_PORT:-3246}/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rtcstack_internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --port 6379
    ports:
      - "${PORT_REDIS:-3247}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rtcstack_internal

  minio:
    image: minio/minio:RELEASE.2024-04-06T05-26-02Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SITE_NAME: ${MINIO_SITE_NAME:-rtcstack-minio}
    volumes:
      - minio_data:/data
    ports:
      - "${PORT_MINIO:-3248}:9000"
      - "${PORT_MINIO_CONSOLE:-3249}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rtcstack_internal


  # ---------------------------------------------------------------------------
  # Speech-to-Text Add-ons (optional profiles)
  #
  # All three services share the same Whisper engine. Start with:
  #   docker compose --profile stt-post up          # post-call only
  #   docker compose --profile stt-live up           # live only (also starts whisper)
  #   docker compose --profile stt-post --profile stt-live up  # both
  #
  # To run whisper on a separate GPU machine see: docker/docker-compose.stt.yml
  # ---------------------------------------------------------------------------

  whisper:
    profiles: [stt-post, stt-live]
    build:
      context: ../services/whisper
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_LANGUAGE: ${STT_LANGUAGE:-auto}
    volumes:
      - whisper_models:/home/whisper/.cache/huggingface
    ports:
      - "${PORT_WHISPER:-3281}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - rtcstack_internal

  stt-worker:
    profiles: [stt-post]
    build:
      context: ../services/stt-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      WHISPER_URL: ${WHISPER_URL:-http://whisper:8080}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      MINIO_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-rtcstack-recordings}
      STT_QUEUE_KEY: stt:queue
      STT_LANGUAGE: ${STT_LANGUAGE:-en}
    depends_on:
      whisper:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - rtcstack_internal

  stt-live-agent:
    profiles: [stt-live]
    build:
      context: ../services/stt-live
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD}@redis:6379}
      WHISPER_URL: ${WHISPER_URL:-http://whisper:8080}
      STT_LANGUAGE: ${STT_LANGUAGE:-en}
      PAUSE_THRESHOLD_SECONDS: ${PAUSE_THRESHOLD_SECONDS:-1.5}
      SHORT_PAUSE_SECONDS: ${SHORT_PAUSE_SECONDS:-0.3}
      MAX_CHUNK_SECONDS: ${MAX_CHUNK_SECONDS:-30.0}
      SPEECH_RMS_THRESHOLD: ${SPEECH_RMS_THRESHOLD:-200}
      WHISPER_MAX_CONCURRENT: ${WHISPER_MAX_CONCURRENT:-2}
    depends_on:
      whisper:
        condition: service_healthy
      livekit:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rtcstack_internal

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  minio_data:
  whisper_models:

networks:
  rtcstack_internal:
    driver: bridge
