<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RTCstack Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0f0f0f; color: #f5f5f5; font-family: system-ui; display: flex; align-items: center; justify-content: center; }
    .wrap { display: flex; flex-direction: column; align-items: center; gap: 24px; }
    h1 { font-size: 24px; font-weight: 700; }
    p { color: #888; font-size: 13px; }
    .links { display: flex; gap: 12px; }
    a { padding: 12px 28px; background: #4f9cf9; color: #fff; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; }
    a:hover { background: #3a8de0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>RTCstack Playground</h1>
    <p>Open two tabs to test a call end-to-end.</p>
    <div class="links">
      <a href="/alice.html" target="_blank">Alice</a>
      <a href="/bob.html" target="_blank">Bob</a>
    </div>
  </div>
</body>
</html>
